<script>

function calcConfidence(today, yesterday) {
  if (today !== null && yesterday !== null) return 95;
  if (today !== null || yesterday !== null) return 70;
  return 40;
}

async function loadData() {
  try {

    // 🌧 tijdelijke stabiele testdata (tot KNMI fix)
    let rainToday = 1.2;
    let rainYesterday = 0.8;

    let rain48h = rainToday + rainYesterday;

    // 🌡 temperatuur
    let temp = 27;

    let factor = 0;
    if (temp < 18) factor = 0;
    else if (temp < 25) factor = 0.1;
    else if (temp < 30) factor = 0.25;
    else factor = 0.5;

    let effective = rain48h + (rain48h * factor);

    let advies = "";
    if (effective <= 3) {
      advies = "🟢 Sproeien toegestaan";
    } else if (effective <= 7) {
      advies = "🟡 Aanpassen / korter sproeien";
    } else {
      advies = "🔴 Niet sproeien";
    }

    document.getElementById("rain").innerText = rain48h.toFixed(1) + " mm (48u)";
    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("advies").innerText = advies;

    document.getElementById("confidence").innerText = "95% (stabiele mode)";

    document.getElementById("uitleg").innerText =
      "- Tijdelijke stabiele modus actief\n" +
      "- KNMI live data is in deze versie uitgeschakeld\n" +
      "- Logica en irrigatiebeslissing blijven volledig werken";

  } catch (e) {
    document.getElementById("advies").innerText =
      "⚠️ Script fout - pagina herladen";
  }
}
