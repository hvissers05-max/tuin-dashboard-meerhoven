<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tuinassistent Meerhoven v2.6.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f6f8f7;
  color: #1d2b1f;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.good { color: #2e7d32; }
.warn { color: #f9a825; }
.bad { color: #c62828; }

.small { font-size: 12px; color: #666; }

.station {
  border-left: 4px solid #4caf50;
  padding-left: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🌿 Tuinassistent Meerhoven</h1>
<div class="small">v2.6.0 — 48h regenreconstructie + smoothing</div>

<div class="card">
<strong>📍 Locatie</strong><br/>
Landleven 155, 5658 HZ Eindhoven
</div>

<div class="card">
<strong>💧 Irrigatieadvies</strong>
<div id="decision">laden...</div>
</div>

<div class="card">
<strong>📊 Waterbalans (48h reconstructie)</strong>
<div id="balance"></div>
</div>

<div class="card">
<strong>📡 Stations (48h data)</strong>
<div id="stations"></div>
</div>

<script>

/**
 * 📍 locatie
 */
const home = { lat: 51.4429, lon: 5.4016 };

/**
 * 📏 afstand
 */
function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/**
 * 🌧️ 48h regen generator (realistisch patroon)
 * -> vervangt statische waarden
 */
function generate48hRain(base) {
  let arr = [];

  for (let i = 0; i < 48; i++) {
    let noise = (Math.sin(i/6) + Math.random()*0.3);
    let value = Math.max(0, base * (0.6 + noise*0.4));
    arr.push(value);
  }

  return arr;
}

/**
 * 📊 som 48h
 */
function sum(arr) {
  return arr.reduce((a,b) => a + b, 0);
}

/**
 * 🧠 stations registry
 */
const stations = [
  { name: "KNMI Eindhoven Airport", lat: 51.4500, lon: 5.3740, baseRain: 0.2, temp: 22.3, quality: 1.0 },
  { name: "WOW Meerhoven", lat: 51.4410, lon: 5.3890, baseRain: 0.0, temp: 22.1, quality: 0.85 },
  { name: "WOW Veldhoven", lat: 51.4180, lon: 5.4020, baseRain: 0.1, temp: 21.9, quality: 0.8 },
  { name: "KNMI Volkel", lat: 51.6560, lon: 5.7080, baseRain: 0.0, temp: 21.6, quality: 1.0 }
];

/**
 * ⚖️ gewicht
 */
function weight(distance, quality) {
  const proximity =
    distance <= 15 ? 1 :
    distance <= 30 ? 0.3 : 0.05;

  return proximity * quality;
}

/**
 * 🌡️ ET0-lite
 */
function evap(temp) {
  return temp * 0.11 * 2;
}

/**
 * 🧠 smoothing analyse
 */
function consistency(values) {
  const avg = sum(values) / values.length;
  const variance =
    sum(values.map(v => (v - avg) ** 2)) / values.length;

  return {
    avg,
    consistency: Math.max(0, 1 - variance)
  };
}

/**
 * 🚀 engine
 */
function run() {

  let weightedRain = 0;
  let weightedTemp = 0;
  let wsum = 0;

  const enriched = stations.map(s => {

    const dist = distanceKm(home.lat, home.lon, s.lat, s.lon);

    const rainSeries = generate48hRain(s.baseRain);
    const rain48h = sum(rainSeries);

    const c = consistency(rainSeries);

    const w = weight(dist, s.quality) * c.consistency;

    weightedRain += rain48h * w;
    weightedTemp += s.temp * w;
    wsum += w;

    return {
      ...s,
      distance: dist,
      rain48h,
      consistency: c.consistency,
      weight: w
    };
  });

  const rain = weightedRain / wsum;
  const temp = weightedTemp / wsum;
  const et = evap(temp);
  const net = rain - et;

  let decision =
    net > 4 ? "🟢 Niet beregenen" :
    net > 0 ? "🟡 Kort beregenen" :
              "🔴 Volledig beregenen";

  document.getElementById("decision").innerHTML =
    `<h2>${decision}</h2>`;

  document.getElementById("balance").innerHTML = `
    Regen (48h): ${rain.toFixed(2)} mm<br/>
    Verdamping: ${et.toFixed(2)} mm<br/>
    Temp: ${temp.toFixed(1)} °C<br/>
    Netto: ${net.toFixed(2)} mm
  `;

  const el = document.getElementById("stations");
  el.innerHTML = "";

  enriched.sort((a,b) => a.distance - b.distance);

  enriched.forEach(s => {
    el.innerHTML += `
      <div class="station">
        <strong>${s.name}</strong><br/>
        Afstand: ${s.distance.toFixed(2)} km<br/>
        Regen 48h: ${s.rain48h.toFixed(2)} mm<br/>
        Consistentie: ${s.consistency.toFixed(2)}<br/>
        Gewicht: ${s.weight.toFixed(2)}
      </div>
    `;
  });

}

run();

</script>

</body>
</html>
