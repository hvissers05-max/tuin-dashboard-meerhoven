<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tuinassistent Meerhoven v2.1.0</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f6f8f7;
      color: #1d2b1f;
    }

    h1 { margin-bottom: 5px; }

    .sub { color: #555; margin-bottom: 20px; }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .station {
      border-left: 4px solid #4caf50;
      padding-left: 10px;
      margin-bottom: 10px;
    }

    .small { font-size: 12px; color: #666; }

    .badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      color: white;
      margin-left: 6px;
    }

    .loading {
      color: #999;
    }
  </style>
</head>

<body>

<h1>🌿 Tuinassistent Meerhoven</h1>
<div class="sub">v2.1.0 — live data loader</div>

<div class="card">
  <strong>📍 Locatie</strong><br/>
  Landleven 155, 5658 HZ Eindhoven
</div>

<div class="card">
  <strong>🌐 Live data</strong>
  <div id="status" class="small loading">Data laden...</div>
</div>

<div class="card">
  <strong>📡 Stations</strong>
  <div id="stations"></div>
</div>

<div class="card">
  <strong>📊 Samenvatting</strong>
  <div id="summary"></div>
</div>

<script>
/**
 * 📍 Tuin locatie
 */
const home = {
  lat: 51.4429,
  lon: 5.4016
};

/**
 * 📏 Haversine
 */
function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) ** 2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/**
 * 🧠 classificatie
 */
function classify(distance) {
  if (distance <= 15) return { type: "primary", weight: 1.0 };
  if (distance <= 30) return { type: "secondary", weight: 0.25 };
  return { type: "reference", weight: 0.05 };
}

/**
 * 🌐 Open-Meteo fetch (grid punten rond jouw locatie)
 */
async function fetchLiveData() {
  const url =
`https://api.open-meteo.com/v1/forecast?latitude=${home.lat}&longitude=${home.lon}&hourly=temperature_2m,precipitation,relative_humidity_2m&forecast_days=1&timezone=Europe%2FAmsterdam`;

  const res = await fetch(url);
  return await res.json();
}

/**
 * 🧪 Simulatie van "virtuele stations"
 * (Open-Meteo is grid-based → we creëren logische punten rond jou)
 */
function buildVirtualStations(data) {
  const baseRain = data.hourly.precipitation?.[0] ?? 0;
  const baseTemp = data.hourly.temperature_2m?.[0] ?? 20;

  return [
    {
      name: "Open-Meteo Grid (centraal)",
      lat: home.lat,
      lon: home.lon,
      rain: baseRain,
      temp: baseTemp
    },
    {
      name: "Open-Meteo Noord",
      lat: home.lat + 0.03,
      lon: home.lon,
      rain: baseRain * 0.95,
      temp: baseTemp - 0.3
    },
    {
      name: "Open-Meteo Zuid",
      lat: home.lat - 0.03,
      lon: home.lon,
      rain: baseRain * 1.05,
      temp: baseTemp + 0.2
    }
  ];
}

/**
 * 🚀 Main
 */
async function init() {
  const status = document.getElementById("status");
  const container = document.getElementById("stations");

  try {
    const data = await fetchLiveData();
    const stations = buildVirtualStations(data);

    let weighted = 0;
    let weightSum = 0;

    const enriched = stations.map(s => {
      const dist = distanceKm(home.lat, home.lon, s.lat, s.lon);
      const cls = classify(dist);

      weighted += s.rain * cls.weight;
      weightSum += cls.weight;

      return { ...s, distance: dist, ...cls };
    });

    const avg = weighted / weightSum;

    enriched.sort((a,b) => a.distance - b.distance);

    enriched.forEach(s => {
      const div = document.createElement("div");
      div.className = "station";

      div.innerHTML = `
        <strong>${s.name}</strong><br/>
        Afstand: ${s.distance.toFixed(2)} km<br/>
        Regen: ${s.rain?.toFixed?.(2) ?? s.rain} mm<br/>
        Temp: ${s.temp} °C<br/>
        Gewicht: ${s.weight}
      `;

      container.appendChild(div);
    });

    document.getElementById("summary").innerHTML = `
      <strong>Gewogen neerslag:</strong> ${avg.toFixed(2)} mm<br/>
      <strong>Stations:</strong> ${stations.length}
    `;

    status.innerText = "Live data geladen (Open-Meteo)";
  }

  catch (e) {
    status.innerText = "Fout bij laden live data";
    console.error(e);
  }
}

init();
</script>

</body>
</html>
