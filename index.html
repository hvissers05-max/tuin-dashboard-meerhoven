<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tuin Meerhoven – Irrigatie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 20px; background: #f5f7fa; }
    .card { background: white; padding: 16px; margin: 12px 0; border-radius: 12px; }
    h1 { font-size: 22px; }
    .big { font-size: 24px; font-weight: bold; }
    .small { white-space: pre-line; color: #444; }
  </style>
</head>

<body>

<h1>🌿 Tuin Meerhoven – Irrigatie</h1>

<div class="card">
  🌧 Regen (48 uur)
  <div class="big" id="rain">laden...</div>
</div>

<div class="card">
  🌡 Temperatuur
  <div class="big" id="temp">laden...</div>
</div>

<div class="card">
  💧 Advies
  <div class="big" id="advies">laden...</div>
</div>

<div class="card">
  📊 Betrouwbaarheid
  <div id="confidence">laden...</div>
</div>

<div class="card">
  📌 Waarom dit advies?
  <div class="small" id="uitleg">laden...</div>
</div>

<script>
function run() {

  console.log("script actief");

  // 🌧 vaste stabiele waarden
  let rainToday = 0;
let rainYesterday = 0;
  let rain48h = rainToday + rainYesterday;

  // 🌡 temperatuur
  let temp = 27;

  // verdamping
  let factor = 0;
  if (temp < 18) factor = 0;
  else if (temp < 25) factor = 0.1;
  else if (temp < 30) factor = 0.25;
  else factor = 0.5;

  let effective = rain48h + (rain48h * factor);

  // 💧 advies
  let advies =
    effective <= 3 ? "🟢 Sproeien toegestaan" :
    effective <= 7 ? "🟡 Aanpassen / korter sproeien" :
    "🔴 Niet sproeien";

  // 📊 output
  document.getElementById("rain").innerText = rain48h.toFixed(1) + " mm";
  document.getElementById("temp").innerText = temp + " °C";
  document.getElementById("advies").innerText = advies;
  document.getElementById("confidence").innerText = "95% stabiel model";

  document.getElementById("uitleg").innerText =
    "- Stabiele basisversie\n" +
    "- Geen externe data\n" +
    "- Volgende stap: KNMI integratie";

}
async function fetchRain() {

  try {
    const url = "https://cdn.knmi.nl/knmi/map/page/klimatologie/gegevens/daggegevens/etmaal_neerslag.txt";
    const res = await fetch(url);
    const text = await res.text();

    const lines = text.split("\n");

    const now = new Date();
    const yday = new Date();
    yday.setDate(now.getDate() - 1);

    for (let line of lines) {

      const parts = line.trim().split(/\s+/);
      if (parts.length < 2) continue;

      const dateStr = parts[0];
      const val = parseInt(parts[parts.length - 1]);

      if (!/^\d{8}$/.test(dateStr)) continue;
      if (isNaN(val)) continue;

      const d = new Date(
        dateStr.substring(0,4),
        dateStr.substring(4,6) - 1,
        dateStr.substring(6,8)
      );

      if (d.toDateString() === now.toDateString()) {
        rainToday = val / 10;
      }

      if (d.toDateString() === yday.toDateString()) {
        rainYesterday = val / 10;
      }
    }

  } catch (e) {
    console.log("fallback regen actief");
    rainToday = 1.2;
    rainYesterday = 0.8;
  }
}
fetchRain().then(() => run());
</script>

</body>
</html>
