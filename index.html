<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tuin Meerhoven – Irrigatie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f7fa; }
    .card { background: white; padding: 16px; margin: 12px 0; border-radius: 12px; }
    h1 { font-size: 22px; }
    .big { font-size: 28px; font-weight: bold; }
    .advies { font-size: 22px; font-weight: bold; }
    .small { font-size: 13px; color: #555; white-space: pre-line; }
  </style>
</head>
<body>

<h1>🌿 Tuin Meerhoven – Irrigatie</h1>

<div class="card">
  <h2>🌧 Regen (48 uur)</h2>
  <div class="big" id="rain">laden...</div>
</div>

<div class="card">
  <h2>🌡 Temperatuur</h2>
  <div class="big" id="temp">laden...</div>
</div>

<div class="card">
  <h2>💧 Advies</h2>
  <div class="advies" id="advies">laden...</div>
</div>

<div class="card">
  <h2>📊 Betrouwbaarheid</h2>
  <div id="confidence">laden...</div>
</div>

<div class="card">
  <h2>📌 Waarom dit advies?</h2>
  <div class="small" id="uitleg">laden...</div>
</div>

<script>

async function loadData() {

  try {

    // 🌧 STABIELE BASISDATA (fase 1 veilig)
    let rainToday = 1.2;
    let rainYesterday = 0.8;

    let rain48h = rainToday + rainYesterday;

    // 🌡 temperatuur (tijdelijk vast model)
    let temp = 27;

    // 🌡 verdamping / droogtecorrectie
    let factor = 0;

    if (temp < 18) factor = 0;
    else if (temp < 25) factor = 0.1;
    else if (temp < 30) factor = 0.25;
    else factor = 0.5;

    let effective = rain48h + (rain48h * factor);

    // 💧 irrigatiebeslissing (ACTIEF systeem)
    let advies = "";

    if (effective <= 3) {
      advies = "🟢 Sproeien toegestaan";
    } else if (effective <= 7) {
      advies = "🟡 Aanpassen / korter sproeien";
    } else {
      advies = "🔴 Niet sproeien";
    }

    // 📊 betrouwbaarheid (fase 1 stabiel)
    let confidence = 95;

    // 📤 output naar scherm
    document.getElementById("rain").innerText = rain48h.toFixed(1) + " mm (48u)";
    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("advies").innerText = advies;
    document.getElementById("confidence").innerText = confidence + "% betrouwbaar";

    document.getElementById("uitleg").innerText =
      "- Regen vandaag: " + rainToday + " mm\n" +
      "- Regen gisteren: " + rainYesterday + " mm\n" +
      "- Temperatuur: " + temp + "°C → verdampingseffect " + (factor * 100) + "%\n" +
      "- Model: stabiele fase 1 (zonder externe data)\n" +
      "- Doel: betrouwbare irrigatiebeslissing voor potplanten";

  } catch (e) {
    document.getElementById("advies").innerText =
      "⚠️ Fout in script - controleer pagina";
  }

}

// start
loadData();

</script>

</body>
</html>
