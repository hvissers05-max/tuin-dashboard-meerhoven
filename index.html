<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tuin Meerhoven – Irrigatie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f7fa; }
    .card { background: white; padding: 16px; margin: 12px 0; border-radius: 12px; }
    h1 { font-size: 22px; }
    .big { font-size: 28px; font-weight: bold; }
    .advies { font-size: 22px; font-weight: bold; }
    .small { font-size: 13px; color: #555; white-space: pre-line; }
  </style>
</head>
<body>

<h1>🌿 Tuin Meerhoven – Irrigatie</h1>

<div class="card">
  <h2>🌧 Regen (48 uur)</h2>
  <div class="big" id="rain">laden...</div>
</div>

<div class="card">
  <h2>🌡 Temperatuur</h2>
  <div class="big" id="temp">laden...</div>
</div>

<div class="card">
  <h2>💧 Advies</h2>
  <div class="advies" id="advies">laden...</div>
</div>

<div class="card">
  <h2>📊 Betrouwbaarheid</h2>
  <div id="confidence">laden...</div>
</div>

<div class="card">
  <h2>📌 Waarom dit advies?</h2>
  <div class="small" id="uitleg">laden...</div>
</div>

<script>

function calcConfidence(today, yesterday) {
  if (today !== null && yesterday !== null) return 95;
  if (today !== null || yesterday !== null) return 70;
  return 40;
}

async function loadData() {
  try {

    const url = "https://cdn.knmi.nl/knmi/map/page/klimatologie/gegevens/daggegevens/etmaal_neerslag.txt";
    const res = await fetch(url);
    const text = await res.text();

    const lines = text.trim().split("\n");

    let rainToday = null;
    let rainYesterday = null;

    const now = new Date();
    const yday = new Date();
    yday.setDate(now.getDate() - 1);

    for (let l of lines) {
      const p = l.trim().split(/\s+/);
      if (p.length < 2) continue;

      const val = parseInt(p[p.length - 1]);
      if (isNaN(val)) continue;

      const dateStr = p[0];
      if (!/^\d{8}$/.test(dateStr)) continue;

      const d = new Date(
        parseInt(dateStr.substring(0,4)),
        parseInt(dateStr.substring(4,6)) - 1,
        parseInt(dateStr.substring(6,8))
      );

      if (d.toDateString() === now.toDateString()) {
        rainToday = val / 10;
      }

      if (d.toDateString() === yday.toDateString()) {
        rainYesterday = val / 10;
      }
    }

    const rain48h = (rainToday ?? 0) + (rainYesterday ?? 0);

    // 🌡 vaste (later API upgrade)
    const temp = 27;

    let factor = 0;
    if (temp < 18) factor = 0;
    else if (temp < 25) factor = 0.1;
    else if (temp < 30) factor = 0.25;
    else factor = 0.5;

    const effective = rain48h + (rain48h * factor);

    let advies = "";
    if (effective <= 3) {
      advies = "🟢 Sproeien toegestaan";
    } else if (effective <= 7) {
      advies = "🟡 Aanpassen / korter sproeien";
    } else {
      advies = "🔴 Niet sproeien";
    }

    const confidence = calcConfidence(rainToday, rainYesterday);

    document.getElementById("rain").innerText =
      rain48h.toFixed(1) + " mm (48u)";

    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("advies").innerText = advies;

    document.getElementById("confidence").innerText =
      confidence + "% betrouwbaar";

    document.getElementById("uitleg").innerText =
      "- Regen vandaag: " + (rainToday ?? "geen data") + " mm\n" +
      "- Regen gisteren: " + (rainYesterday ?? "geen data") + " mm\n" +
      "- Temperatuur: " + temp + "°C → verdampingseffect " + (factor*100) + "%\n" +
      "- Effectieve berekening voor potplanten en druppelslangen";

  } catch (e) {
    document.getElementById("advies").innerText =
      "⚠️ Data niet beschikbaar";
  }
}

loadData();

</script>

</body>
</html>
