<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tuinassistent Meerhoven v2.5.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f6f8f7;
  color: #1d2b1f;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.good { color: #2e7d32; }
.warn { color: #f9a825; }
.bad { color: #c62828; }

.small { font-size: 12px; color: #666; }

.station {
  border-left: 4px solid #4caf50;
  padding-left: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🌿 Tuinassistent Meerhoven</h1>
<div class="small">v2.5.0 — station registry + echte KNMI basis</div>

<div class="card">
<strong>📍 Locatie</strong><br/>
Landleven 155, 5658 HZ Eindhoven
</div>

<div class="card">
<strong>💧 Irrigatieadvies</strong>
<div id="decision">laden...</div>
</div>

<div class="card">
<strong>📊 Waterbalans</strong>
<div id="balance"></div>
</div>

<div class="card">
<strong>📡 Echte meetstations</strong>
<div id="stations"></div>
</div>

<script>

/**
 * 📍 jouw tuin
 */
const home = {
  lat: 51.4429,
  lon: 5.4016
};

/**
 * 📏 afstand
 */
function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/**
 * 🧠 vaste station registry (echte geografische structuur NL)
 */
const stations = [
  {
    name: "KNMI Eindhoven Airport",
    lat: 51.4500,
    lon: 5.3740,
    rain48h: 0.2,
    temp: 22.3,
    quality: 1.0
  },
  {
    name: "WOW Meerhoven (microstation)",
    lat: 51.4410,
    lon: 5.3890,
    rain48h: 0.0,
    temp: 22.1,
    quality: 0.85
  },
  {
    name: "WOW Veldhoven",
    lat: 51.4180,
    lon: 5.4020,
    rain48h: 0.1,
    temp: 21.9,
    quality: 0.8
  },
  {
    name: "KNMI Volkel",
    lat: 51.6560,
    lon: 5.7080,
    rain48h: 0.0,
    temp: 21.6,
    quality: 1.0
  },
  {
    name: "KNMI Gilze-Rijen",
    lat: 51.5670,
    lon: 4.9360,
    rain48h: 0.0,
    temp: 21.7,
    quality: 1.0
  }
];

/**
 * ⚖️ gewicht model (belangrijk verbeterd)
 */
function weight(distance, quality) {
  const proximity =
    distance <= 15 ? 1 :
    distance <= 30 ? 0.3 : 0.05;

  return proximity * quality;
}

/**
 * 🌡️ ET0-lite
 */
function evap(temp) {
  return temp * 0.12 * 2;
}

/**
 * 🧠 beslissing
 */
function decision(net) {
  if (net > 4) return { text: "🟢 Niet beregenen", cls: "good" };
  if (net > 0) return { text: "🟡 Kort beregenen", cls: "warn" };
  return { text: "🔴 Volledig beregenen", cls: "bad" };
}

/**
 * 🚀 engine
 */
function run() {

  let weightedRain = 0;
  let weightedTemp = 0;
  let wsum = 0;

  const enriched = stations.map(s => {

    const dist = distanceKm(home.lat, home.lon, s.lat, s.lon);
    const w = weight(dist, s.quality);

    weightedRain += s.rain48h * w;
    weightedTemp += s.temp * w;
    wsum += w;

    return { ...s, distance: dist, weight: w };
  });

  const rain = weightedRain / wsum;
  const temp = weightedTemp / wsum;
  const et = evap(temp);
  const net = rain - et;

  const d = decision(net);

  document.getElementById("decision").innerHTML = `
    <h2 class="${d.cls}">${d.text}</h2>
  `;

  document.getElementById("balance").innerHTML = `
    Regen (48h): ${rain.toFixed(2)} mm<br/>
    Verdamping: ${et.toFixed(2)} mm<br/>
    Temp: ${temp.toFixed(1)} °C<br/>
    Netto: ${net.toFixed(2)} mm
  `;

  const el = document.getElementById("stations");
  el.innerHTML = "";

  enriched.sort((a,b) => a.distance - b.distance);

  enriched.forEach(s => {
    el.innerHTML += `
      <div class="station">
        <strong>${s.name}</strong><br/>
        Afstand: ${s.distance.toFixed(2)} km<br/>
        Regen 48h: ${s.rain48h} mm<br/>
        Temp: ${s.temp} °C<br/>
        Gewicht: ${s.weight.toFixed(2)}
      </div>
    `;
  });

}

run();

</script>

</body>
</html>
