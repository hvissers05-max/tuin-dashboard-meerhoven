<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tuinassistent Meerhoven v2.3.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f6f8f7;
  color: #1d2b1f;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.good { color: #2e7d32; }
.warn { color: #f9a825; }
.bad { color: #c62828; }

.small { font-size: 12px; color: #666; }

.station {
  border-left: 4px solid #4caf50;
  padding-left: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🌿 Tuinassistent Meerhoven</h1>
<div class="small">v2.3.0 — irrigatie engine v1</div>

<div class="card">
<strong>📍 Locatie</strong><br/>
Landleven 155, 5658 HZ Eindhoven
</div>

<div class="card">
<strong>💧 Irrigatieadvies</strong>
<div id="decision">berekenen...</div>
</div>

<div class="card">
<strong>📊 Waterbalans</strong>
<div id="balance"></div>
</div>

<div class="card">
<strong>📡 Stations (vereenvoudigd)</strong>
<div id="stations"></div>
</div>

<script>

/**
 * 📍 locatie
 */
const home = { lat: 51.4429, lon: 5.4016 };

/**
 * 🌦️ vereenvoudigde stations (van vorige versie)
 */
const stations = [
  { name: "KNMI Eindhoven", rain: 11.8, temp: 22.4, dist: 4.0 },
  { name: "WOW Meerhoven", rain: 12.1, temp: 22.2, dist: 1.2 },
  { name: "WOW Veldhoven", rain: 12.0, temp: 21.9, dist: 3.5 },
  { name: "WOW Acht", rain: 11.6, temp: 22.0, dist: 6.0 }
];

/**
 * 💧 gewogen regen
 */
function weightedRain() {
  let sum = 0;
  let wsum = 0;

  stations.forEach(s => {
    let w = s.dist < 15 ? 1 : 0.3;
    sum += s.rain * w;
    wsum += w;
  });

  return sum / wsum;
}

/**
 * 🌡️ ET0-lite (vereenvoudigd)
 * basis: 0.15 mm per °C per dag → 2 dagen = 48h
 */
function evap(tempAvg) {
  return tempAvg * 0.15 * 2;
}

/**
 * 🌡️ gemiddelde temperatuur
 */
function avgTemp() {
  return stations.reduce((a,b) => a + b.temp, 0) / stations.length;
}

/**
 * 🧠 beslissing engine
 */
function decision(net) {
  if (net > 5) return { text: "🟢 Niet beregenen", cls: "good" };
  if (net > 0) return { text: "🟡 Kort beregenen", cls: "warn" };
  return { text: "🔴 Volledig beregenen", cls: "bad" };
}

/**
 * 🚀 run
 */
function run() {

  const rain = weightedRain();
  const temp = avgTemp();
  const et = evap(temp);

  const net = rain - et;

  const d = decision(net);

  document.getElementById("decision").innerHTML =
    `<h2 class="${d.cls}">${d.text}</h2>
     <div class="small">Netto balans: ${net.toFixed(2)} mm</div>`;

  document.getElementById("balance").innerHTML = `
    Regen (48u): ${rain.toFixed(2)} mm<br/>
    Verdamping (ET0-lite): ${et.toFixed(2)} mm<br/>
    Temperatuur: ${temp.toFixed(1)} °C<br/>
    Netto water: ${net.toFixed(2)} mm
  `;

  const el = document.getElementById("stations");
  stations.forEach(s => {
    el.innerHTML += `
      <div class="station">
        ${s.name}<br/>
        Regen: ${s.rain} mm<br/>
        Temp: ${s.temp} °C<br/>
        Afstand: ${s.dist} km
      </div>
    `;
  });
}

run();

</script>

</body>
</html>
