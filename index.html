<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tuinassistent Meerhoven v2.0.0</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f6f8f7;
      color: #1d2b1f;
    }

    h1 {
      margin-bottom: 5px;
    }

    .sub {
      color: #555;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .station {
      border-left: 4px solid #4caf50;
      padding-left: 10px;
      margin-bottom: 10px;
    }

    .secondary {
      border-left-color: #ff9800;
    }

    .reference {
      border-left-color: #9e9e9e;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 6px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }

    .badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      color: white;
    }

    .primary { background: #4caf50; }
    .secondary { background: #ff9800; }
    .reference { background: #9e9e9e; }

  </style>
</head>

<body>

<h1>🌿 Tuinassistent Meerhoven</h1>
<div class="sub">
  v2.0.0 — datalaag (stations + afstand + classificatie)
</div>

<div class="card">
  <strong>📍 Locatie tuin</strong><br/>
  Landleven 155, 5658 HZ Eindhoven<br/>
  <span class="small">Basis voor alle afstandsberekeningen</span>
</div>

<div class="card">
  <strong>📡 Stationsanalyse</strong>
  <div id="stations"></div>
</div>

<div class="card">
  <strong>📊 Samenvatting (ruw)</strong>
  <div id="summary"></div>
</div>

<script>
/**
 * 📍 Tuin locatie (vast)
 */
const home = {
  lat: 51.4429,
  lon: 5.4016
};

/**
 * 🌦️ Seed stations (later vervangen door echte API calls)
 */
const stations = [
  { name: "KNMI Eindhoven", lat: 51.4500, lon: 5.3740, rain: 12.1, temp: 22.4, updated: "14:00" },
  { name: "WOW Meerhoven", lat: 51.4410, lon: 5.3890, rain: 11.8, temp: 22.1, updated: "13:55" },
  { name: "WOW Veldhoven", lat: 51.4180, lon: 5.4020, rain: 12.4, temp: 21.9, updated: "13:50" },
  { name: "WOW Acht", lat: 51.4760, lon: 5.4260, rain: 11.9, temp: 22.0, updated: "13:45" },
  { name: "WOW Best", lat: 51.5070, lon: 5.3920, rain: 13.8, temp: 22.3, updated: "13:40" },
  { name: "Referentie Tilburg", lat: 51.5550, lon: 5.0910, rain: 10.5, temp: 21.5, updated: "13:30" }
];

/**
 * 📏 Haversine afstand (km)
 */
function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/**
 * 🧠 Classificatie + gewicht
 */
function classify(distance) {
  if (distance <= 15) return { type: "primary", weight: 1.0 };
  if (distance <= 30) return { type: "secondary", weight: 0.25 };
  return { type: "reference", weight: 0.05 };
}

/**
 * 📊 Berekening
 */
let weightedRainSum = 0;
let weightSum = 0;

const enriched = stations.map(s => {
  const dist = distanceKm(home.lat, home.lon, s.lat, s.lon);
  const cls = classify(dist);

  const weighted = s.rain * cls.weight;

  weightedRainSum += weighted;
  weightSum += cls.weight;

  return {
    ...s,
    distance: dist,
    type: cls.type,
    weight: cls.weight
  };
});

const avgRain = weightedRainSum / weightSum;

/**
 * 📤 Render stations
 */
const container = document.getElementById("stations");

enriched.sort((a,b) => a.distance - b.distance);

enriched.forEach(s => {
  const div = document.createElement("div");
  div.className = `station ${s.type}`;

  div.innerHTML = `
    <strong>${s.name}</strong>
    <span class="badge ${s.type}">${s.type}</span><br/>
    Afstand: ${s.distance.toFixed(2)} km<br/>
    Regen: ${s.rain} mm<br/>
    Temp: ${s.temp} °C<br/>
    Update: ${s.updated}<br/>
    Gewicht: ${s.weight}
  `;

  container.appendChild(div);
});

/**
 * 📊 Samenvatting
 */
document.getElementById("summary").innerHTML = `
  <strong>Gewogen neerslag (ruw):</strong> ${avgRain.toFixed(2)} mm<br/>
  <strong>Aantal stations:</strong> ${stations.length}<br/>
  <span class="small">Nog zonder verdamping en zonder advies-engine</span>
`;
</script>

</body>
</html>
