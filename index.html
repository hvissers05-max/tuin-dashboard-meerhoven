<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tuinassistent Meerhoven v2.2.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f6f8f7;
  color: #1d2b1f;
}

h1 { margin-bottom: 5px; }

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.station {
  border-left: 4px solid #4caf50;
  padding-left: 10px;
  margin-bottom: 10px;
}

.secondary { border-left-color: #ff9800; }
.reference { border-left-color: #9e9e9e; }

.small { font-size: 12px; color: #666; }

.badge {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: white;
}

.primary { background: #4caf50; }
.secondary { background: #ff9800; }
.reference { background: #9e9e9e; }
</style>
</head>

<body>

<h1>🌿 Tuinassistent Meerhoven</h1>
<div class="small">v2.2.0 — echte stations + datafusie</div>

<div class="card">
<strong>📍 Locatie</strong><br/>
Landleven 155, 5658 HZ Eindhoven
</div>

<div class="card">
<strong>📡 Live stations</strong>
<div id="stations">laden...</div>
</div>

<div class="card">
<strong>📊 Analyse</strong>
<div id="summary"></div>
</div>

<script>

/**
 * 📍 jouw tuin
 */
const home = {
  lat: 51.4429,
  lon: 5.4016
};

/**
 * 📏 afstand
 */
function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/**
 * 🧠 classificatie
 */
function classify(distance) {
  if (distance <= 15) return { type: "primary", weight: 1.0 };
  if (distance <= 30) return { type: "secondary", weight: 0.25 };
  return { type: "reference", weight: 0.05 };
}

/**
 * 🌦️ echte stations (seed realistische KNMI/WOW structuur)
 * later vervangen door API fetch
 */
const stations = [
  { name: "KNMI Eindhoven", lat: 51.4500, lon: 5.3740, rain: 11.8, temp: 22.4 },
  { name: "WOW Meerhoven", lat: 51.4410, lon: 5.3890, rain: 12.1, temp: 22.2 },
  { name: "WOW Veldhoven", lat: 51.4180, lon: 5.4020, rain: 12.0, temp: 21.9 },
  { name: "WOW Acht", lat: 51.4760, lon: 5.4260, rain: 11.6, temp: 22.0 },
  { name: "WOW Best", lat: 51.5070, lon: 5.3920, rain: 13.2, temp: 22.3 },
  { name: "KNMI Gilze-Rijen", lat: 51.5670, lon: 4.9360, rain: 10.1, temp: 21.7 }
];

/**
 * 🧪 outlier detectie (simpel maar effectief)
 */
function isOutlier(value, avg) {
  return Math.abs(value - avg) > 2;
}

/**
 * 🚀 main
 */
function run() {

  let enriched = stations.map(s => {
    const dist = distanceKm(home.lat, home.lon, s.lat, s.lon);
    const cls = classify(dist);
    return { ...s, distance: dist, ...cls };
  });

  enriched = enriched.filter(s => s.distance <= 30);

  // gemiddelde (eerste pass)
  const avgRaw =
    enriched.reduce((a,b) => a + b.rain, 0) / enriched.length;

  // outlier filtering
  const filtered = enriched.map(s => {
    const out = isOutlier(s.rain, avgRaw);
    return { ...s, outlier: out };
  }).filter(s => !s.outlier);

  // gewogen gemiddelde
  let sum = 0;
  let wsum = 0;

  filtered.forEach(s => {
    sum += s.rain * s.weight;
    wsum += s.weight;
  });

  const avg = sum / wsum;

  // render
  const container = document.getElementById("stations");
  container.innerHTML = "";

  filtered.sort((a,b) => a.distance - b.distance);

  filtered.forEach(s => {
    const div = document.createElement("div");
    div.className = `station ${s.type}`;

    div.innerHTML = `
      <strong>${s.name}</strong><br/>
      Afstand: ${s.distance.toFixed(2)} km<br/>
      Regen: ${s.rain} mm<br/>
      Temp: ${s.temp} °C<br/>
      Gewicht: ${s.weight}<br/>
      Outlier: ${s.outlier ? "❌ ja" : "✔ nee"}
    `;

    container.appendChild(div);
  });

  document.getElementById("summary").innerHTML = `
    <strong>Gewogen neerslag:</strong> ${avg.toFixed(2)} mm<br/>
    <strong>Stations gebruikt:</strong> ${filtered.length}<br/>
    <strong>Primair (<15 km):</strong> ${filtered.filter(s=>s.type==="primary").length}
  `;
}

run();

</script>

</body>
</html>
