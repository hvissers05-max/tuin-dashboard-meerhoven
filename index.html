<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tuin Meerhoven – Debug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 20px; background: #f5f7fa; }
    .card { background: white; padding: 16px; margin: 12px 0; border-radius: 12px; }
    .big { font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>

<h1>🌿 Debug Test – Tuin Meerhoven</h1>

<div class="card">
  <div id="status" class="big">SCRIPT NIET GESTART ❌</div>
</div>

<div class="card">
  <div>Regen:</div>
  <div id="rain">laden...</div>
</div>

<div class="card">
  <div>Temperatuur:</div>
  <div id="temp">laden...</div>
</div>

<div class="card">
  <div>Advies:</div>
  <div id="advies">laden...</div>
</div>

<script>

document.getElementById("status").innerText = "SCRIPT DRAAIT ✅";

console.log("Script gestart");

let rainToday = 1.2;
let rainYesterday = 0.8;

let rain48h = rainToday + rainYesterday;

let temp = 27;

let factor = 0;
if (temp < 18) factor = 0;
else if (temp < 25) factor = 0.1;
else if (temp < 30) factor = 0.25;
else factor = 0.5;

let effective = rain48h + (rain48h * factor);

let advies = "";

if (effective <= 3) {
  advies = "🟢 Sproeien toegestaan";
} else if (effective <= 7) {
  advies = "🟡 Aanpassen";
} else {
  advies = "🔴 Niet sproeien";
}

document.getElementById("rain").innerText = rain48h + " mm";
document.getElementById("temp").innerText = temp + " °C";
document.getElementById("advies").innerText = advies;

</script>

</body>
</html>
